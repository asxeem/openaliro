# ST25R500 (X-NUCLEO shield) reader profile — layered by build.sh for
# NFC=st25r, together with -DCONFIG_NFC_DRIVER_STM=y and the RFAL backend of
# the woz_nfc transport seam. These settings only have meaning with the ST
# driver in the image, which is why they live here and not in woz-aliro.conf.

# Apple ECP / Express tap: register the RFAL proprietary-poll hook so the
# reader broadcasts an Aliro-TCI ECP frame each poll → iPhone auto-presents
# its Aliro pass with no Face ID. The hook implementation is the out-of-tree
# woz_aliro_ecp module. (The PN532 backend emits the same frame itself.)
CONFIG_DOOR_LOCK_NFC_PROP=y

# RFAL at INFO (upstream ships DBG): surfaces reader init + tag/ISO-DEP
# detection + the "ECP Aliro frame armed" line, without DBG noise. Trim to WRN
# once the tap path is stable.
CONFIG_DOOR_LOCK_RFAL_LOG_LEVEL_INF=y
