# Net-core (ipc_radio) RAM trim — pass via -Dipc_radio_EXTRA_CONF_FILE=<...>/ipc_radio.conf
#
# Appends after the stock ipc_radio overlays (overlay-bt_hci_ipc.conf +
# overlay-802154.conf, wired by nRF's netcore.cmake). Only symbols that are
# actually ON and overridable are set here; ISO / periodic-adv / periodic-sync /
# direction-finding are already disabled at the enable level and their *_SUPPORT
# capability flags are prompt-less (select-driven), so they cannot be flipped from
# a .conf and are deliberately omitted. Fully reversible: drop the -D flag to
# restore stock. Zero ranging coupling — the DW3000 UWB PHY is a separate chip on
# the app-core SPI bus and never touches this radio.

# --- BLE controller: drop Coded PHY (long-range) --------------------------
# Matter commissioning and the Aliro URSK link both run on LE 1M; Coded PHY
# (S=2/S=8 long range) is never requested. default y if BT_HCI_RAW, so it is on
# in stock. Disabling frees the controller's Coded-PHY timing/scan state.
CONFIG_BT_CTLR_PHY_CODED=n

# --- 802.15.4 (Thread Sleepy End Device) receive queue --------------------
# Radio-side RX frame buffers. Stock 20 is sized for router/RCP throughput; an
# MTD-SED polls its parent and receives few frames, so 8 is ample. This is a
# serialized setting: the app-core host (CONFIG_NRF_802154_SER_HOST) MUST carry
# the identical value (set in woz-aliro.conf) or the two cores desync.
CONFIG_NRF_802154_RX_BUFFERS=8

# --- 802.15.4 pending-child address tables --------------------------------
# Slots for buffering indirect frames to sleepy children. Only a parent
# (router / FTD) uses them; this device is MTD-SED (OPENTHREAD_MTD_SED) and never
# has children, so the stock 16+16 slots are dead RAM. Trim to the minimum.
CONFIG_NRF_802154_PENDING_SHORT_ADDRESSES=1
CONFIG_NRF_802154_PENDING_EXTENDED_ADDRESSES=1
