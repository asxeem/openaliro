# Latency diagnostic — layered only when building with LAT=1 (build.sh).
# Off by default; a re-runnable tool, not part of a normal build.
#
# Purpose: time where the lock/unlock notification delay sits. The firmware sets
# the LockState attribute ~1 ms after the unlock decision (T_set), but at INF
# level you can't see when the resulting Matter ReportData physically leaves the
# device (T_tx). DBG prints every CHIP message TX/RX with a timestamp, including
# that ReportData: a small T_tx - T_set means firmware egress is fast and the lag
# is downstream; seconds means the report is stuck in-device.
#
# Reversible: drop LAT=1 and this file is not layered.
CONFIG_MATTER_LOG_LEVEL_DBG=y

# The DBG firehose during the tap/AUTH burst can overflow the deferred log buffer
# and drop the ReportData TX line we're trying to time. Enlarge it.
CONFIG_LOG_BUFFER_SIZE=32768
