# Woz sysbuild overlay — pass via -DSB_EXTRA_CONF_FILE=<...>/sysbuild-woz.conf
# Additive on the stock app sysbuild.conf (SB_CONFIG_MATTER=y). Upstream pristine.

# No OTA/DFU on the bench (west flash writes both cores directly), so drop the
# MCUboot bootloader to reclaim its ~32 KB app-core slot for the UWB engine.
# Pairs with overlays/pm_static.yml (no-bootloader layout) + CHIP_BOOTLOADER_NONE.
SB_CONFIG_BOOTLOADER_NONE=y
SB_CONFIG_BOOTLOADER_MCUBOOT=n

# Disable Matter OTA at the sysbuild layer. nrf/sysbuild/CMakeLists.txt force-writes
# CONFIG_CHIP_OTA_REQUESTOR into the app from THIS symbol (bypassing app Kconfig),
# so this is the only effective place to turn OTA off; it releases the
# DFU_TARGET/IMG_MANAGER chain that needs the removed mcuboot partition.
SB_CONFIG_MATTER_OTA=n
