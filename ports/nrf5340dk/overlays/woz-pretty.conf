# Woz "pretty shell" overlay — applied AFTER woz-aliro.conf (last file wins) when
# the build is run with PRETTY=1 (see build.sh). Turn the whole feature off by
# dropping PRETTY=1; every setting here reverts and the build is byte-identical
# to the verbose default. One switch, fully reversible.

# --- The gate ---------------------------------------------------------------
# Compiles the curated log path in ccc_shim_rx.c / uwb_rxdiag.c and the app's
# self-emitted QR line; collapses the per-frame DIAGK trace to no-ops.
CONFIG_WOZ_PRETTY_SHELL=y

# --- Runtime muting of benign upstream error spam ---------------------------
# Enable per-source runtime log filtering so woz_logquiet.c can drop the stock
# Matter/BLE lines logged at ERR/WRN that are non-fatal on this bare DK (mDNS
# advertiser churn, "Long dispatch time", unsupported-attribute reads, BLE
# double-stop, empty-slot Access Document reads). A compile-time level cut can't
# isolate them: each shares its CONFIG_*_LOG_LEVEL with a source whose INFO lines
# drive the demo. Reverts with PRETTY (the file compiles only under the gate).
CONFIG_LOG_RUNTIME_FILTERING=y

# --- Log-level cuts that pair with the gate ---------------------------------
# Drop Matter message-exchange chatter to warnings (~40% of the console). The
# commissioning QR is re-emitted by the app itself, so nothing is lost.
CONFIG_MATTER_LOG_LEVEL_WRN=y
# The Aliro stack ships at DEBUG (key/plaintext hexdumps + state spam). INFO keeps
# the useful lines and drops the firehose.
CONFIG_NCS_ALIRO_LOG_LEVEL_INF=y

# --- High-res timestamp + compact colored log line (woz_logfmt.c) -----------
# Own the whole log line: DWT-cycle-counter timestamps (~ns resolution vs the
# RTC's ~30.5 us). TIMESTAMP_64BIT is required because DWT->CYCCNT is 32-bit and
# wraps every ~33 s (woz_logfmt.c accumulates deltas into 64 bits).
CONFIG_LOG_CUSTOM_FORMAT_SUPPORT=y
CONFIG_LOG_TIMESTAMP_64BIT=y

# --- Route logs through the plain UART backend (PRETTY-only) ----------------
# The shell log backend renders every line with the fixed text formatter
# (shell_log_backend.c hardcodes log_output_msg_process) and exposes no
# format_set hook, so the custom colored formatter in woz_logfmt.c can never
# reach it. Disable it and route logs through CONFIG_LOG_BACKEND_UART instead,
# which supports format_set and autostarts before woz_logfmt_init. The `aliro`
# shell still runs for commands on the same uart0; only log rendering moves.
# Reverts with PRETTY (both symbols return to their SHELL-backed defaults).
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_LOG_BACKEND_UART=y

# --- Console cosmetics (PRETTY-only) ----------------------------------------
# Enabling VT100 colors alone turns the prompt green (the shell prints it with
# SHELL_INFO color) without baking ANSI escapes into the prompt string, which
# would desync the shell's strlen()-based cursor math.
CONFIG_SHELL_VT100_COLORS=y
CONFIG_SHELL_PROMPT_UART="aliro ❯ "
# Colorize log output; required by woz_logfmt.c's custom formatter.
CONFIG_LOG_BACKEND_SHOW_COLOR=y
