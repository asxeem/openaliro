# Woz UWB ranging engine on ESP32-S3 (DW3000 over SPI2). Superseded Zephyr spike:
# the live port is ports/esp32-idf. See ports/README.md.

# --- Engine layers (each depends on the one below) ---
CONFIG_WOZ_UWB=y
CONFIG_WOZ_UWB_RESPONDER=y
CONFIG_WOZ_ALIRO=y

# --- Crypto seam: mbedTLS AES (no Nordic PSA backend on ESP32) ---
CONFIG_WOZ_CRYPTO_MBEDTLS=y

# --- DW3000 decadriver (deps/dw3000): enable + select the seated chip ---
CONFIG_DW3000=y
CONFIG_DW3000_CHIP_DW3000=y

# --- Peripherals (WOZ_UWB already select's SPI+GPIO; explicit for clarity) ---
CONFIG_SPI=y
CONFIG_GPIO=y
# REQUIRED: the DW3000 driver drives SPI via spi_transceive_signal() (async).
# The ESP32-S3 SPI driver only wires .transceive_async under CONFIG_SPI_ASYNC.
CONFIG_SPI_ASYNC=y

# --- Codec allocates via k_malloc; give it a heap ---
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# --- Logging ---
CONFIG_LOG=y
