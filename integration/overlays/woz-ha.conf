# Woz Home-Assistant overlay — layered after woz-aliro.conf by HA=1 ./build.sh
#
# Opt-in only. Everything here is deliberately kept out of the default build so
# the Apple Home + Wallet demo image is unaffected. Pair it with HA=1 at
# bootstrap time, which is what applies the matching data-model patches
# (ha-lockoperation-event, ha-occupancy-endpoint).

# --- Lock operation credentials --------------------------------------------
# Attach the credential that opened the lock to the LockState update, so a Matter
# admin (e.g. Home Assistant) sees which credential acted, not just the new state.
# The call site is already written for it (app_task.cpp guards the credential
# list on this symbol), and the Aliro path fills the result in
# ValidateAliroCredential() with kAliroNonEvictableEndpointKey /
# kAliroEvictableEndpointKey, so this covers tap and approach, not only PIN.
#
# Upstream deliberately defaults it off: "This option should stay disabled until
# TC-DRLK-2.3 is fixed", connectedhomeip issue 38222 (add-on src/matter/Kconfig).
# That is a certification-test failure rather than a known functional break, but
# it is why this lives here and not in woz-aliro.conf.
CONFIG_LOCK_PASS_CREDENTIALS_TO_SET_LOCK_STATE=y
