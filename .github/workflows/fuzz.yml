# Coverage-guided fuzzing of the wire-facing parsers (Aliro UWB ranging TLV, CCC
# MAC SP0 frames, Aliro BLE APDU codec). These consume attacker-controlled radio
# and BLE bytes, so a parser crash is a security bug — it fails loud. libFuzzer
# explores fresh inputs here; the checked-in corpus also replays under ASan
# locally (fuzz.sh falls back to a portable driver where no libFuzzer exists).
name: fuzz

on:
  push:
    branches: [main]
    paths:
      - modules/woz_uwb/**
      - modules/woz_aliro/**
      - tests/host/**
      - Makefile
      - .github/workflows/fuzz.yml
  # No path filter on PRs: keep it reporting like the other required checks.
  pull_request:
  workflow_dispatch:

# CI only reads the repo: no token write scopes for any job.
permissions:
  contents: read

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  libfuzzer:
    runs-on: ubuntu-latest
    env:
      CC: clang # the libFuzzer runtime (-fsanitize=fuzzer) is clang-only
      FUZZ_SECONDS: "45" # per-target budget: a PR smoke run, not an endurance run
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install clang (libFuzzer runtime)
        run: sudo apt-get update -q && sudo apt-get install -y -q clang
      - name: fuzz the wire parsers
        run: make fuzz
