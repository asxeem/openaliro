# Enforces the repo .clang-format over the project-owned C core (modules/).
# Pinned to the exact clang-format used for the bulk reformat — output differs
# across majors, so an unpinned check would flap on runner upgrades.
name: format

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - .clang-format
      - .github/workflows/format.yml
  # No path filter on PRs: format is a required check, and a path-skipped
  # workflow never reports (PR stuck at "Expected"). The old noop-twin
  # workaround double-reported on mixed PRs; always running is cheap.
  pull_request:
  workflow_dispatch:

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install pinned clang-format
        run: pip install clang-format==22.1.8
      - name: check modules/ formatting
        run: |
          git ls-files 'modules/*.c' 'modules/*.h' 'modules/*.cpp' \
            | xargs clang-format --dry-run --Werror
