# Host-side correctness gate: the pure-C KAT suite plus line coverage of our
# core. No NCS toolchain, no hardware — plain cc on a stock runner (run.sh).
name: host-tests

on:
  push:
    branches: [main]
    paths:
      - modules/woz_uwb/**
      - tests/host/**
      - Makefile
      - .github/workflows/host-tests.yml
  # No path filter on PRs: test/coverage are required checks, and a
  # path-skipped workflow never reports (PR stuck at "Expected"). The old
  # noop-twin workaround double-reported on mixed PRs; always running is cheap.
  pull_request:
  workflow_dispatch:

# CI only reads the repo: no token write scopes for any job.
permissions:
  contents: read

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # markdown==3.8 arms test_flash_html's regen-drift gate (it skips
      # without the package); pinned to the version the committed
      # release/*/FLASH.html files were rendered with.
      - name: install python deps for the tooling suites
        run: python3 -m pip install 'markdown==3.8'
      - name: run host KAT suite
        run: make test

  # Portability leg: the same suite under the other compiler/libc pairs the
  # project targets (test above covers gcc/glibc; coverage covers clang/glibc's
  # build; macOS gcc is a clang alias, so it adds nothing). Not a required
  # check yet — new contexts should prove stable before branch protection pins
  # them.
  portability:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: run host KAT suite (${{ matrix.cc }}, ${{ matrix.os }})
        run: make test

  coverage:
    runs-on: ubuntu-latest
    env:
      CC: clang # coverage.sh's instrumentation flags are clang-only
      COV_MIN: "90" # line-% floor; raised from 80 after the coverage push
      # landed the full denominator (shared core + reader engine + headers)
      # at 96.1%. History: 85 against the woz_uwb-only set (89.2%), 80 at
      # the honest-denominator re-base (84.7%).
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: install llvm (llvm-profdata / llvm-cov)
        run: sudo apt-get update -q && sudo apt-get install -y -q llvm
      # coverage.py puts real percentages on the python surface rows;
      # markdown==3.8 lets the flash_html suite execute under measurement.
      - name: install python deps (coverage.py + markdown)
        run: python3 -m pip install coverage 'markdown==3.8'
      - name: build instrumented + run + report
        run: make coverage
      - name: enforce line-coverage floor
        run: |
          python3 - <<'EOF'
          import json, os, sys
          t = json.load(open("build/coverage/summary.json"))["data"][0]["totals"]
          pct, floor = t["lines"]["percent"], float(os.environ["COV_MIN"])
          print(f"total line coverage {pct:.2f}% (floor {floor:.0f}%)")
          sys.exit(0 if pct >= floor else 1)
          EOF
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: build/coverage/html
