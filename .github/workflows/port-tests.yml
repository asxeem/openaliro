# ESP32 port correctness gate: the host-runnable port suite (port headers,
# Aliro crypto KATs, wire codec, provisioning) compiled from the same sources
# the target builds. No ESP-IDF on the runner — run.sh's on-target build step
# skips cleanly when idf.py is absent.
name: port-tests

on:
  push:
    branches: [main]
    paths:
      - ports/esp32/**
      - modules/woz_uwb/**
      - modules/woz_aliro/**
      - Makefile
      - .github/workflows/port-tests.yml
  # No path filter on PRs: a path-skipped workflow never reports (PR stuck at
  # "Expected") once this is a required check; always running is cheap.
  pull_request:
  workflow_dispatch:

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: run ESP32 port host suite
        run: make test-port
