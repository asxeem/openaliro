# Lints the CI itself. actionlint checks workflow syntax, expression types and
# the shell in run: blocks; zizmor audits workflow security (token scopes,
# credential persistence, template injection) — the class of finding that
# otherwise only surfaces as a code-scanning alert after merge.
name: workflow-lint

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
  # No path filter on PRs: keep it reporting like the other required checks.
  pull_request:
  workflow_dispatch:

# CI only reads the repo: no token write scopes for any job.
permissions:
  contents: read

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # Release binary, checksum-pinned like the SHA-pinned actions.
      - name: install pinned actionlint
        run: |
          curl -fsSLo /tmp/actionlint.tgz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tgz" \
            | sha256sum -c -
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
      - name: lint workflows
        run: /tmp/actionlint -color
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: install pinned zizmor
        run: pip install zizmor==1.27.0
      - name: audit workflow security
        env:
          # Read-only token: lets the online audits check advisories for the
          # exact action SHAs we pin.
          GH_TOKEN: ${{ github.token }}
        run: zizmor .github/workflows
