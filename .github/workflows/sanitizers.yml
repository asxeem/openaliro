# The same host suite rebuilt under ASan + UBSan (make test-san). The parser and
# session code here ultimately consume attacker-controlled radio input, so memory
# bugs and UB in this core are security bugs — they fail loud, not silent.
name: sanitizers

on:
  push:
    branches: [main]
    paths:
      - modules/woz_uwb/**
      - tests/host/**
      - Makefile
      - .github/workflows/sanitizers.yml
  # No path filter on PRs: asan-ubsan is a required check, and a path-skipped
  # workflow never reports (PR stuck at "Expected"). The old noop-twin
  # workaround double-reported on mixed PRs; always running is cheap.
  pull_request:
  workflow_dispatch:

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: run host suite under ASan + UBSan
        run: make test-san
