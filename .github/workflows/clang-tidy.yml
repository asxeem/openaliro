# Bug-finding static analysis (bugprone / cert / clang-analyzer) over the
# host-compilable core: the same file set and flags the host suite builds
# (tests/host/sources.sh), so no NCS toolchain is needed. Check policy lives in
# .clang-tidy. Pinned to the clang-format release for the same reason format.yml
# pins: check sets and diagnostics shift across LLVM majors.
name: clang-tidy

on:
  push:
    branches: [main]
    paths:
      - modules/**
      - tests/host/**
      - .clang-tidy
      - .github/workflows/clang-tidy.yml
  # No path filter on PRs: keep it reporting like the other required checks.
  pull_request:
  workflow_dispatch:

# CI only reads the repo: no token write scopes for any job.
permissions:
  contents: read

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install pinned clang-tidy
        run: pip install clang-tidy==22.1.8
      - name: analyze the host-compilable core
        run: |
          ROOT="$PWD"
          # shellcheck disable=SC1091
          . tests/host/sources.sh
          clang-tidy --quiet "${UNIT_SRCS[@]}" -- -std=c11 "${DEFS[@]}" "${INCS[@]}"
