# Firmware build gates — prove the shipped firmware trees still compile.
# Heavyweight cross-toolchain builds, so none of these jobs is a required
# check: a path-skipped job that never reports is fine here (contrast with the
# required checks, e.g. patch-drift.yml, which must always report on PRs).
#
# Workflow-level `paths:` can only gate the whole file, so per-job filtering
# uses a change-detection job: `changes` computes which build inputs a push/PR
# actually touched and each build job keys off its output.
name: firmware-builds

on:
  push:
    branches: [main]
    paths:
      - ports/esp32/**
      - ports/nrf5340dk/**
      - modules/**
      - deps/dw3000/**
      - west.yml
      - scripts/bootstrap.sh
      - scripts/build.sh
      - .github/workflows/firmware-builds.yml
  pull_request:
    paths:
      - ports/esp32/**
      # The Matter app builds only on push/nightly/dispatch (see esp32-matter
      # below), so PRs touching nothing but its app dir skip the workflow.
      - "!ports/esp32/apps/matter-lock/**"
      - ports/nrf5340dk/**
      - modules/**
      - deps/dw3000/**
      - west.yml
      - scripts/bootstrap.sh
      - scripts/build.sh
      - .github/workflows/firmware-builds.yml
  workflow_dispatch:
  # Nightly canary for the Matter build: its setup reaches live upstreams
  # (esp-matter submodules, CHIP CIPD packages), so breakage can appear with
  # no push here. 03:27 UTC.
  schedule:
    - cron: "27 3 * * *"

# CI only reads the repo: no token write scopes for any job.
permissions:
  contents: read

# Superseded runs on the same ref are wasted work — cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Which build inputs did this push/PR touch? Feeds the per-job gates below.
  # On workflow_dispatch and schedule the filter is skipped and every gate's
  # event condition takes over (a manual run builds everything; the nightly
  # builds the Matter app).
  changes:
    runs-on: ubuntu-latest
    outputs:
      esp32-idf: ${{ steps.filter.outputs.esp32-idf }}
      nrf5340dk: ${{ steps.filter.outputs.nrf5340dk }}
      esp32-matter: ${{ steps.filter.outputs.esp32-matter }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          persist-credentials: false
          # Push events diff against the pre-push commit, which a depth-1
          # clone does not have.
          fetch-depth: 0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        id: filter
        with:
          # The esp32 component/module dirs are shared by both ESP32 apps;
          # per-app dirs are added on top (see the app CMakeLists for the
          # REPO_ROOT source references the components compile).
          filters: |
            esp32-shared: &esp32-shared
              - ports/esp32/components/**
              - modules/woz_aliro/**
              - modules/woz_port/**
              - modules/woz_uwb/**
              - deps/dw3000/**
              - .github/workflows/firmware-builds.yml
            esp32-idf:
              - *esp32-shared
              - ports/esp32/apps/reader/**
            esp32-matter:
              - *esp32-shared
              - ports/esp32/apps/matter-lock/**
            nrf5340dk:
              - west.yml
              - scripts/bootstrap.sh
              - scripts/build.sh
              - ports/nrf5340dk/**
              - modules/woz_uwb/**
              - modules/woz_aliro_ecp/**
              - modules/woz_port/**
              - deps/dw3000/**
              - .github/workflows/firmware-builds.yml

  # Plain ESP-IDF reader app. All dependencies are in-tree, so this is the
  # cheapest firmware build: the official IDF container plus idf.py.
  esp32-idf:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.esp32-idf == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: espressif/idf@sha256:b9f2d6ea1c19e0c9f7959bdb74a9e3c775642f9d0f3b841937c5fa3363db892b # v5.5.4
    env:
      IDF_CCACHE_ENABLE: "1"
      CCACHE_MAXSIZE: 300M
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # Compiler cache: the run-unique key means the post-job save always
      # uploads a fresh cache, and restore-keys picks the newest previous one
      # (stale entries fall out via LRU eviction). Unlike the workspace/tree
      # caches below, a stale ccache is harmless — worst case is a slower
      # build, never a wrong one.
      - name: restore the compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-esp32-idf-${{ github.run_id }}
          restore-keys: |
            ccache-esp32-idf-
      - name: build the reader app (esp32s3)
        working-directory: ports/esp32/apps/reader
        # Steps bypass the image entrypoint, so source the IDF env explicitly.
        run: |
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build
          { command -v ccache >/dev/null && ccache -s | head -n 6; } || echo "no ccache on PATH"

  # nRF5340 DK Zephyr/NCS build: bootstrap the pinned west workspace (multi-GB
  # fetch), then the sysbuild image. The bootstrapped workspace is cached,
  # keyed on everything that shapes its content — the pin record (west.yml),
  # the applier (scripts/bootstrap.sh: add-on pin, NCS version and patch list
  # live there) and the patch files — so patch drift forces a cold bootstrap.
  # Deliberately no restore-keys: bootstrap.sh cannot re-patch a workspace
  # that already carries another patch state (patches that add files leave
  # untracked files behind), so a near-miss cache would poison the build.
  nrf5340dk:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.nrf5340dk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      # NCS toolchain container matching west.yml's NCS v3.3.0. Its BASH_ENV
      # hook sources the toolchain env (west, Zephyr SDK on PATH) in every
      # non-interactive bash, so the scripts run with ALIRO_TOOLCHAIN=env: the
      # default nrfutil launcher would look for its toolchain index under
      # $HOME, which the runner overrides away from the image's /opt.
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain@sha256:f24d8932ff081ebcd8da9c248f4449bdabe461c0620a7a4ac9e95eb577ba2276 # v3.3.0
    env:
      ALIRO_TOOLCHAIN: env
      # History-free fetch of exactly the pinned revisions: the same tree
      # state at a fraction of the size, so bootstrap and the workspace cache
      # are both much faster. The bench default keeps full clones.
      ALIRO_SHALLOW: "1"
      CCACHE_MAXSIZE: 1G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: restore the bootstrapped west workspace
        id: ws
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: workspace
          key: nrf-workspace-${{ hashFiles('west.yml', 'scripts/bootstrap.sh', 'ports/nrf5340dk/patches/**') }}
      - name: bootstrap the workspace (cold cache)
        if: steps.ws.outputs.cache-hit != 'true'
        # One retry: bootstrap is resumable (the fetch sentinel means a rerun
        # picks up where an interrupted west update stopped), so a transient
        # fetch failure costs one resume, not the whole multi-GB fetch.
        run: |
          ./scripts/bootstrap.sh || {
            echo "::warning::bootstrap failed once — retrying (resumes the fetch)"
            ./scripts/bootstrap.sh
          }
      # Save before building: the build writes only to ./build, so the
      # workspace is already complete here, and an expensive bootstrap is not
      # lost when the build step itself fails (the failure this gate exists
      # to catch).
      - name: save the workspace cache (cold cache)
        if: steps.ws.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: workspace
          key: ${{ steps.ws.outputs.cache-primary-key }}
      # See the esp32-idf job for the ccache key/restore-keys rationale. The
      # NCS toolchain bundles ccache and Zephyr picks it up from PATH
      # automatically (zephyr/cmake/modules/ccache.cmake), so warm builds
      # skip most compilation.
      - name: restore the compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-nrf5340dk-${{ github.run_id }}
          restore-keys: |
            ccache-nrf5340dk-
      - name: build (nrf5340dk/nrf5340/cpuapp, sysbuild)
        run: |
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          ./scripts/build.sh build
          { command -v ccache >/dev/null && ccache -s | head -n 6; } || echo "no ccache on PATH"

  # ESP32-S3 Matter door lock against esp-matter at the bench-validated
  # revision (6+ GB once the CHIP submodule tree is in). Deliberately kept off
  # PRs — push to main, nightly and manual runs only — until the cache proves
  # out. The esp-matter tree (including CHIP's CIPD-fetched gn/zap under
  # .environment) is cached on a static key: its revision is pinned, so only
  # a revision or IDF bump rolls the key.
  esp32-matter:
    needs: changes
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.changes.outputs.esp32-matter == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 240
    container:
      image: espressif/idf@sha256:b9f2d6ea1c19e0c9f7959bdb74a9e3c775642f9d0f3b841937c5fa3363db892b # v5.5.4
    env:
      # The bench-validated esp-matter revision; the cache key derives from it.
      ESP_MATTER_REV: 93b168027bf95f4e467230345ad1f2d147eb1f6b
      ESP_MATTER_PATH: /opt/esp/esp-matter
      IDF_CCACHE_ENABLE: "1"
      CCACHE_MAXSIZE: 1G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: restore esp-matter
        id: esp-matter
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /opt/esp/esp-matter
          key: esp-matter-${{ env.ESP_MATTER_REV }}-idf-v5.5.4
      - name: fetch + install esp-matter (cold cache)
        if: steps.esp-matter.outputs.cache-hit != 'true'
        # Pinned-SHA clone (git clone --branch takes no SHA, so init + fetch),
        # then the setup esp-matter documents: shallow esp32 submodules and
        # install.sh, minus the chip-tool/chip-cert host tools the firmware
        # build never runs. One from-scratch retry absorbs transient fetch
        # failures. Subshell + && chain on purpose: the cd stays contained,
        # and `set -e` is suppressed inside a `||` context, so an explicit
        # chain is the only reliable early-exit.
        run: |
          . "$IDF_PATH/export.sh"
          setup() (
            rm -rf "$ESP_MATTER_PATH" &&
            git init -q "$ESP_MATTER_PATH" &&
            cd "$ESP_MATTER_PATH" &&
            git remote add origin https://github.com/espressif/esp-matter.git &&
            git fetch -q --depth 1 origin "$ESP_MATTER_REV" &&
            git checkout -q FETCH_HEAD &&
            git submodule update --init --depth 1 &&
            ./connectedhomeip/connectedhomeip/scripts/checkout_submodules.py \
              --platform esp32 linux --shallow &&
            ./install.sh --no-host-tool
          )
          setup || {
            echo "::warning::esp-matter setup failed once — retrying from scratch"
            setup
          }
      # Save before building, so a broken app build does not throw away the
      # expensive fetch + install.
      - name: save the esp-matter cache (cold cache)
        if: steps.esp-matter.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /opt/esp/esp-matter
          key: ${{ steps.esp-matter.outputs.cache-primary-key }}
      - name: install the esp-matter python deps (warm cache)
        if: steps.esp-matter.outputs.cache-hit == 'true'
        # install.sh put these into the IDF python env, which lives in the
        # container image, not in the cache — reinstate them on cache hits.
        run: |
          . "$IDF_PATH/export.sh"
          python3 -m pip install -q -r "$ESP_MATTER_PATH/requirements.txt"
      # See the esp32-idf job for the ccache key/restore-keys rationale.
      # Covers the IDF-side components; the CHIP core built through GN keeps
      # its own compile times.
      - name: restore the compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-esp32-matter-${{ github.run_id }}
          restore-keys: |
            ccache-esp32-matter-
      - name: build the matter-lock app (esp32s3)
        working-directory: ports/esp32/apps/matter-lock
        run: |
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          . "$IDF_PATH/export.sh"
          . "$ESP_MATTER_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build
          { command -v ccache >/dev/null && ccache -s | head -n 6; } || echo "no ccache on PATH"
