<script id="gv3d-data" type="application/json">{"nodes":[{"id":"integration/homeassistant/aliro_mqtt_bridge.py","name":"aliro_mqtt_bridge.py","grp":"integration","slug":"integration.homeassistant.aliro_mqtt_bridge.html","blurb":"Republish the lock's console log to MQTT as Home Assistant entities."},{"id":"modules/woz_aliro/include/aliro_advtag.h","name":"aliro_advtag.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_advtag.h.html","blurb":"Aliro BLE advertisement Dynamic Tag derivation (Aliro 1.0 section 11.3.1): the 7-byte GroupResolvingKey-resolvable tag the phone recomputes to identify a reader of interest."},{"id":"modules/woz_aliro/include/aliro_ble.h","name":"aliro_ble.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_ble.h.html","blurb":"Aliro BLE-UWB reader transport: GATT service definition, advertised feature flags, and transport callbacks connecting the BLE peripheral role to the Aliro protocol handler in aliro_reader. Callers configure the transport via aliro_ble_prepare (which builds the READ characteristic payload without touching NimBLE), then register the GATT service returned by aliro_ble_service_def with the host's combined service table."},{"id":"modules/woz_aliro/include/aliro_crypto.h","name":"aliro_crypto.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_crypto.h.html","blurb":"Aliro crypto public API: key derivation, AES-GCM secure channels, and wire message seal/open framing shared by the reader and device sides of an Aliro session."},{"id":"modules/woz_aliro/include/aliro_lab.h","name":"aliro_lab.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_lab.h.html","blurb":"Aliro Lab trace: structured \"[ALAB]\" lines at transaction phase boundaries, parsed by tools/aliro_lab.py into a scored walk-up report. Ships in every Aliro build (CONFIG_WOZ_ALIRO_LAB defaults y, like the sibling uwbdiag trace) but is OFF at boot and toggled at runtime by the lab on/lab off console command, so any firmware profiles on demand with no reflash. Set CONFIG_WOZ_ALIRO_LAB=n to strip it from a hardened production image."},{"id":"modules/woz_aliro/include/aliro_lat.h","name":"aliro_lat.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_lat.h.html","blurb":"*No module docstring. First commit: \"Cut ESP32 walk-up unlock latency: instrument, unblock, and precompute\".*"},{"id":"modules/woz_aliro/include/aliro_prim.h","name":"aliro_prim.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_prim.h.html","blurb":""},{"id":"modules/woz_aliro/include/aliro_prov.h","name":"aliro_prov.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_prov.h.html","blurb":"Persistent reader provisioning storage: identity and credential trust anchors saved to and loaded from NVS. Declares aliro_prov_store for committing an identity/trust pair to NVS, and struct aliro_trust_store, the set of trusted credential public keys against which a presented credential is authenticated."},{"id":"modules/woz_aliro/include/aliro_reader.h","name":"aliro_reader.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_reader.h.html","blurb":""},{"id":"modules/woz_aliro/include/aliro_stepup.h","name":"aliro_stepup.h","grp":"woz_aliro","slug":"modules.woz_aliro.include.aliro_stepup.h.html","blurb":"Aliro step-up (Access Document) phase: builds the mdoc DeviceRequest, unwraps and decrypts the SessionData DeviceResponse, decodes the CBOR document per spec 7.2/8.4.2, and runs the six-step Access Document verification of spec 7.4. Reference-completeness codec + verifier; the verdict is logged and stored, never gates the unlock (the provisioned trust store remains the sole gate)."},{"id":"modules/woz_aliro/src/aliro_advtag.c","name":"aliro_advtag.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_advtag.c.html","blurb":"Aliro BLE advertisement Dynamic Tag derivation (Aliro 1.0 section 11.3.1), shared by the BLE transport (live advertising) and the host KAT suite (spec section 20 worked examples)."},{"id":"modules/woz_aliro/src/aliro_apdu.c","name":"aliro_apdu.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_apdu.c.html","blurb":"Aliro APDU TLV codec: builds command payloads (AUTH0, AUTH1, AuthData, EXCHANGE) and parses response APDUs, plus BLE envelope framing/unframing and ISO7816 APDU wrap/status-word stripping. Provides a minimal BER-TLV writer (aliro_tlv_w_init/put/finish) used to assemble command payloads, and TLV/APDU parsing helpers used to extract fields from device responses."},{"id":"modules/woz_aliro/src/aliro_apdu.h","name":"aliro_apdu.h","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_apdu.h.html","blurb":"APDU framing and parsing for the Aliro Access Protocol: builds outbound command APDUs via a TLV writer and parses the AUTH0/AUTH1 response APDUs exchanged during the reader-device handshake."},{"id":"modules/woz_aliro/src/aliro_crypto.c","name":"aliro_crypto.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_crypto.c.html","blurb":"Aliro cryptographic primitives: key derivation (KDF/HKDF), key-block splitting, AES-GCM secure channels, and wire message framing built on a pluggable crypto backend (aliro_prim_*). Implements the Aliro key-derivation chain (ECDH shared secret -> z -> 160-byte key block -> split session keys / URSK / BLE ranging keys), per-direction AES-256-GCM secure channels with monotonic message counters, and the seal/open framing used to carry engine plaintext over the wire."},{"id":"modules/woz_aliro/src/aliro_hash.c","name":"aliro_hash.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_hash.c.html","blurb":"Self-contained SHA-256, HMAC-SHA256, HKDF, and ANSI-X9.63 KDF implementation for the ESP32-IDF Aliro crypto port, with no external crypto library dependency."},{"id":"modules/woz_aliro/src/aliro_hash.h","name":"aliro_hash.h","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_hash.h.html","blurb":"Streaming SHA-256 (FIPS 180-4) implementation used by the Aliro crypto layer. Declares struct aliro_sha256, the incremental hash context used across init/update/finish calls."},{"id":"modules/woz_aliro/src/aliro_lat.c","name":"aliro_lat.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_lat.c.html","blurb":"Walk-up latency trace: first-hit phase timestamps + the consolidated budget line."},{"id":"modules/woz_aliro/src/aliro_prim_psa.c","name":"aliro_prim_psa.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_prim_psa.c.html","blurb":"Aliro crypto primitive backend implemented on Arm PSA Crypto: random generation, AES-256-GCM encrypt/decrypt, and NIST P-256 key generation, ECDH, and ECDSA sign/verify. Provides the aliro_prim_* / aliro_* primitive functions consumed by the higher-level Aliro KDF and secure-channel code in aliro_crypto.c; callers must call aliro_prim_init before using any other function in this file."},{"id":"modules/woz_aliro/src/aliro_prov.c","name":"aliro_prov.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_prov.c.html","blurb":"Aliro reader provisioning state: default dev identity, and serialization/deserialization of the reader identity plus trusted-credential store to/from a self-describing binary blob. Also implements the trust-store membership check and add-with-dedup operations used to decide whether a presented credential public key is trusted."},{"id":"modules/woz_aliro/src/aliro_ranging.c","name":"aliro_ranging.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_ranging.c.html","blurb":"UWB ranging bring-up and lifecycle for the Aliro reader: initializes the reader's UWB adapter and Cherry CCC context once, then arms, feeds, and tears down per-connection ranging sessions driven by the M1-M4 setup exchanged over the peer's L2CAP channel. Maintains process-wide singletons for the Cherry context and adapter (set up once via aliro_ranging_init) and for the single active ranging session (the DW3000 supports only one session at a time), tracking its owning secure channel for send/receive framing."},{"id":"modules/woz_aliro/src/aliro_ranging.h","name":"aliro_ranging.h","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_ranging.h.html","blurb":"Aliro M1-M4 ranging-setup interface: negotiates UWB ranging parameters with the device and produces the BLE ranging-control secure channel used to carry the M1-M4 exchange."},{"id":"modules/woz_aliro/src/aliro_reader.c","name":"aliro_reader.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_reader.c.html","blurb":"Aliro reader engine: drives the Access Protocol (AUTH0/AUTH1/EXCHANGE) handshake over BLE, manages reader identity and credential trust provisioning in NVS, and arms UWB ranging once a session is authenticated. Maintains a fixed-size table of per-connection sessions tracking transaction phase and secure-channel state, and exposes start/attach entry points for both standalone and Matter-attached BLE transports, plus provisioning and diagnostic APIs used by Matter commissioning and the bench console."},{"id":"modules/woz_aliro/src/aliro_stepup.c","name":"aliro_stepup.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_stepup.c.html","blurb":"Aliro step-up phase codec + verifier: derives the StepUpSK SessionData keys, builds the mdoc DeviceRequest and its ENVELOPE/GET RESPONSE APDUs, seals/opens SessionData over the aliro_secchan AES-256-GCM channel, and runs the six-step Access Document verification of spec 7.4. The ES256 primitive is injected (verify ctx) so this unit carries no elliptic-curve dependency."},{"id":"modules/woz_aliro/src/aliro_stepup_parse.c","name":"aliro_stepup_parse.c","grp":"woz_aliro","slug":"modules.woz_aliro.src.aliro_stepup_parse.c.html","blurb":"DeviceResponse structural decoder for the Aliro step-up phase: a minimal, bounds-checked, depth-limited CBOR reader (definite-length core-deterministic only) plus the Table 8-22/7-1/7-2 field walk. No crypto and no allocation; every parsed field is a slice of the caller's buffer. This is the wire-facing attack surface and is fuzzed on its own (tests/host/fuzz/fuzz_stepup.c)."},{"id":"modules/woz_aliro_ecp/src/nfc_prop_ecp.cpp","name":"nfc_prop_ecp.cpp","grp":"woz_aliro_ecp","slug":"modules.woz_aliro_ecp.src.nfc_prop_ecp.cpp.html","blurb":"NFC Type A proprietary callback implementation for Aliro Express unlock (tap-to-unlock without Face ID). Emits a CRC_A\u2013checksummed ECP frame carrying the reader identifier."},{"id":"modules/woz_port/include/woz_log.h","name":"woz_log.h","grp":"woz_port","slug":"modules.woz_port.include.woz_log.h.html","blurb":"*No module docstring. First commit: \"modules: promote the platform contract to modules/woz_port\".*"},{"id":"modules/woz_port/include/woz_port.h","name":"woz_port.h","grp":"woz_port","slug":"modules.woz_port.include.woz_port.h.html","blurb":"*No module docstring. First commit: \"modules: promote the platform contract to modules/woz_port\".*"},{"id":"modules/woz_uwb/src/aliro/aliro_uwb_adapter.c","name":"aliro_uwb_adapter.c","grp":"woz_uwb/aliro","slug":"modules.woz_uwb.src.aliro.aliro_uwb_adapter.c.html","blurb":"@file aliro_uwb_adapter.c \u2014 reader-context lifecycle."},{"id":"modules/woz_uwb/src/aliro/aliro_uwb_internal.h","name":"aliro_uwb_internal.h","grp":"woz_uwb/aliro","slug":"modules.woz_uwb.src.aliro.aliro_uwb_internal.h.html","blurb":"@file aliro_uwb_internal.h \u2014 private context types and shared helpers."},{"id":"modules/woz_uwb/src/aliro/aliro_uwb_msg.c","name":"aliro_uwb_msg.c","grp":"woz_uwb/aliro","slug":"modules.woz_uwb.src.aliro.aliro_uwb_msg.c.html","blurb":"@file aliro_uwb_msg.c \u2014 setup/notification message codec."},{"id":"modules/woz_uwb/src/aliro/aliro_uwb_msg.h","name":"aliro_uwb_msg.h","grp":"woz_uwb/aliro","slug":"modules.woz_uwb.src.aliro.aliro_uwb_msg.h.html","blurb":"@file aliro_uwb_msg.h \u2014 message framing accessors, dispatch and builders."},{"id":"modules/woz_uwb/src/aliro/aliro_uwb_msg_builder.c","name":"aliro_uwb_msg_builder.c","grp":"woz_uwb/aliro","slug":"modules.woz_uwb.src.aliro.aliro_uwb_msg_builder.c.html","blurb":"@file W3110 bring-up driver (implementation)."},{"id":"modules/woz_uwb/src/driver/uwb_min.h","name":"uwb_min.h","grp":"woz_uwb/driver","slug":"modules.woz_uwb.src.driver.uwb_min.h.html","blurb":"@file uwb_min.h \u2014 Minimal DW3110 (DWM3000EVB) hardware bring-up driver."},{"id":"modules/woz_uwb/src/driver/uwb_rxdiag.c","name":"uwb_rxdiag.c","grp":"woz_uwb/driver","slug":"modules.woz_uwb.src.driver.uwb_rxdiag.c.html","blurb":"@file uwb_rxdiag.c \u2014 Diagnostic RX/TX event tallies + ranging heartbeat."},{"id":"modules/woz_uwb/src/driver/uwb_rxdiag.h","name":"uwb_rxdiag.h","grp":"woz_uwb/driver","slug":"modules.woz_uwb.src.driver.uwb_rxdiag.h.html","blurb":"@file uwb_rxdiag.h \u2014 Read-side accessors for the RX event tallies + log stream."},{"id":"modules/woz_uwb/src/driver/uwb_selftest.c","name":"uwb_selftest.c","grp":"woz_uwb/driver","slug":"modules.woz_uwb.src.driver.uwb_selftest.c.html","blurb":"@file uwb_selftest.c \u2014 Kconfig-gated one-shot UWB init self-test (no iPhone)."},{"id":"modules/woz_uwb/src/facade/trace.h","name":"trace.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.trace.h.html","blurb":"@file trace.h \u2014 Structured [WOZ_TRACE] emit helpers, gated on CONFIG_WOZ_E2E_TRACE."},{"id":"modules/woz_uwb/src/facade/woz_alloc.h","name":"woz_alloc.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_alloc.h.html","blurb":"Memory allocation and timing facade: qmalloc, qcalloc, qfree wrap the platform heap; qrtc_get_us returns monotonic microseconds since boot."},{"id":"modules/woz_uwb/src/facade/woz_bytes.h","name":"woz_bytes.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_bytes.h.html","blurb":"*No module docstring. First commit: \"port: replace the Zephyr compat shims with a neutral woz_port.h contract\".*"},{"id":"modules/woz_uwb/src/facade/woz_diag.h","name":"woz_diag.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_diag.h.html","blurb":"@file woz_diag.h \u2014 DIAGK(): gate for verbose UWB bring-up diagnostics."},{"id":"modules/woz_uwb/src/facade/woz_logfmt.c","name":"woz_logfmt.c","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_logfmt.c.html","blurb":"@file woz_logfmt.c \u2014 PRETTY-gated high-res timestamp + compact colored log line."},{"id":"modules/woz_uwb/src/facade/woz_logquiet.c","name":"woz_logquiet.c","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_logquiet.c.html","blurb":"@file woz_logquiet.c \u2014 PRETTY-gated runtime muting of benign upstream error spam. The stock Matter/BLE stack logs several non-fatal conditions at LOG_ERR/LOG_WRN (red/yellow): mDNS advertiser \"incorrect state\" churn, \"Long dispatch time\" perf notes, unsupported-attribute reads, the \"No valid legacy adv to stop\" BLE double-stop, and the empty-slot \"Failed to get Access Document at index: 0\" the access layer emits on first contact. All are expected on this bare DK bring-up and every one is proven benign by the healthy unlock that follows. A compile-time level cut can't remove just these: each noisy source shares its CONFIG_*_LOG_LEVEL with a source whose INFO lines drive the demo narrative (access_document shares CONFIG_DOOR_LOCK_APP_LOG_LEVEL with access_manager's \"ACCESS GRANTED\"/ranging lines; bt_adv shares CONFIG_BT_HCI_CORE_LOG_LEVEL), and a threshold below ERR still lets ERR through. So mute per-source at runtime. Reversible: compiled only under CONFIG_WOZ_PRETTY_SHELL (PRETTY=1). Drop PRETTY and every one of these lines returns for raw diagnosis. Needs CONFIG_LOG_RUNTIME_FILTERING=y (set in ports/nrf5340dk/overlays/woz-pretty.conf)."},{"id":"modules/woz_uwb/src/facade/woz_util.h","name":"woz_util.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_util.h.html","blurb":"*No module docstring. First commit: \"port: replace the Zephyr compat shims with a neutral woz_port.h contract\".*"},{"id":"modules/woz_uwb/src/facade/woz_uwb_facade.c","name":"woz_uwb_facade.c","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_uwb_facade.c.html","blurb":"UWB facade: binds the CCC credential-based STS engine to the DW3000 radio, exposes Aliro DS-TWR responder start/stop and range query, and manages platform dependencies (HFCLK boost, SPI init, callbacks)."},{"id":"modules/woz_uwb/src/facade/woz_uwb_facade.h","name":"woz_uwb_facade.h","grp":"woz_uwb/facade","slug":"modules.woz_uwb.src.facade.woz_uwb_facade.h.html","blurb":"Public header for UWB facade: exposes Aliro DS-TWR responder lifecycle and range query; the CCC engine is bound and unbound via internal ursk and stop calls."},{"id":"modules/woz_uwb/src/fira/fira_device_config.h","name":"fira_device_config.h","grp":"woz_uwb/fira","slug":"modules.woz_uwb.src.fira.fira_device_config.h.html","blurb":"@file fira_device_config.h \u2014 FiRa DS-TWR device/session parameter bag consumed by fira_session.c."},{"id":"modules/woz_uwb/src/fira/fira_session.c","name":"fira_session.c","grp":"woz_uwb/fira","slug":"modules.woz_uwb.src.fira.fira_session.c.html","blurb":"@file fira_session.c \u2014 Range + URSK store for the CCC Pre-POLL responder."},{"id":"modules/woz_uwb/src/fira/fira_session.h","name":"fira_session.h","grp":"woz_uwb/fira","slug":"modules.woz_uwb.src.fira.fira_session.h.html","blurb":"@file fira_session.h \u2014 Range + URSK store for the CCC Pre-POLL responder."},{"id":"modules/woz_uwb/src/shell/aliro_shell.c","name":"aliro_shell.c","grp":"woz_uwb/shell","slug":"modules.woz_uwb.src.shell.aliro_shell.c.html","blurb":"@file aliro_shell.c \u2014 aliro UART shell command: colored console over the UWB engine."},{"id":"ports/esp32/apps/matter-lock/main/app_driver.cpp","name":"app_driver.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.app_driver.cpp.html","blurb":"Board driver glue for the ESP32 Matter port: button input, WS2812 lock-status LED, and the Matter attribute-update hook wired into the app's driver layer."},{"id":"ports/esp32/apps/matter-lock/main/app_main.cpp","name":"app_main.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.app_main.cpp.html","blurb":"Matter application main: door lock endpoint setup, Matter lifecycle event handling, and (when CONFIG_ENABLE_ALIRO_BLE_UWB is set) startup/coexistence wiring for the Aliro BLE+UWB reader alongside the Matter BLE commissioning transport. Owns the Aliro reader background task (started once on commissioning-complete or at boot if already commissioned) and the Matter attribute/identify/device-event callbacks required by esp-matter's node/cluster framework."},{"id":"ports/esp32/apps/matter-lock/main/app_priv.h","name":"app_priv.h","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.app_priv.h.html","blurb":""},{"id":"ports/esp32/apps/matter-lock/main/app_shell.cpp","name":"app_shell.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.app_shell.cpp.html","blurb":"ESP32-IDF console shell for the Aliro Matter door lock app: registers status, range, aliro, lock/unlock, codes, factoryreset, and clear commands and runs the REPL."},{"id":"ports/esp32/apps/matter-lock/main/app_shell.h","name":"app_shell.h","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.app_shell.h.html","blurb":""},{"id":"ports/esp32/apps/matter-lock/main/lock_led.c","name":"lock_led.c","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock_led.c.html","blurb":"Lock-state indicator LED: maps lock state (and Aliro activity) to an RGB colour for the single status pixel. Locked always extinguishes the indicator; unlocked shows blue during active UWB/Aliro engagement and a different colour otherwise, per lock_led_color."},{"id":"ports/esp32/apps/matter-lock/main/lock_led.h","name":"lock_led.h","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock_led.h.html","blurb":"Lock status LED color mapping: derives the RGB color for the lock indicator from the current locked and Aliro-ranging state."},{"id":"ports/esp32/apps/matter-lock/main/lock/aliro_reader_delegate.cpp","name":"aliro_reader_delegate.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock.aliro_reader_delegate.cpp.html","blurb":"AliroReaderDelegate: implements the Aliro reader-provisioning and BLE-UWB portions of the Matter DoorLock::Delegate interface, backing the controller-facing GetAliro*/SetAliroReaderConfig commands and persisting the provisioned reader identity via aliro_reader_provision_identity. Bridges Matter cluster commands to the underlying aliro_reader NVS-backed identity/trust store and to the BLE advertising layer (refreshed when the group resolving key changes)."},{"id":"ports/esp32/apps/matter-lock/main/lock/aliro_reader_delegate.h","name":"aliro_reader_delegate.h","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock.aliro_reader_delegate.h.html","blurb":"Declares AliroReaderDelegate, the Aliro (Apple Home Key) reader-provisioning and BLE-UWB half of the Matter DoorLock cluster delegate, bridging controller commands to the on-device reader identity, trust store, and BLE advertising state."},{"id":"ports/esp32/apps/matter-lock/main/lock/door_lock_callbacks.cpp","name":"door_lock_callbacks.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock.door_lock_callbacks.cpp.html","blurb":"Matter DoorLock cluster plugin callbacks: wires the ESP32 port's BoltLockManager into the Matter DoorLock cluster's lock/unlock commands, user and credential storage, schedule storage, cluster init, and auto-relock notification hooks."},{"id":"ports/esp32/apps/matter-lock/main/lock/door_lock_manager.cpp","name":"door_lock_manager.cpp","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock.door_lock_manager.cpp.html","blurb":"BoltLockManager: Matter door lock cluster backing store for the ESP32 port. Implements the DoorLock cluster's user, credential, and weekday/yearday/holiday schedule get/set callbacks over fixed-size in-memory tables mirrored to NVM (ESP32Config blobs), plus lock/unlock actuation and PIN validation. Cluster indices are one-indexed by Matter and decremented internally before bounds-checking against this platform's fixed capacity limits."},{"id":"ports/esp32/apps/matter-lock/main/lock/door_lock_manager.h","name":"door_lock_manager.h","grp":"ports/esp32","slug":"ports.esp32.apps.matter-lock.main.lock.door_lock_manager.h.html","blurb":"Door lock manager for the Matter DoorLock cluster: owns bolt lock state plus the users, credentials, and weekday/yearday/holiday schedules backing the cluster's server attributes. Declares BoltLockManager (accessed via the BoltLockMgr() singleton) and the LockInitParams::LockParam/ParamBuilder types used to configure it from zap-derived capacity attributes at init time."},{"id":"ports/esp32/apps/reader/main/app_shell.c","name":"app_shell.c","grp":"ports/esp32","slug":"ports.esp32.apps.reader.main.app_shell.c.html","blurb":"ESP32-IDF console shell for the standalone Aliro UWB responder bench app: registers status, range, aliro-start/stop, provisioning, trust, and clear commands and runs the linenoise-based REPL."},{"id":"ports/esp32/apps/reader/main/app_shell.h","name":"app_shell.h","grp":"ports/esp32","slug":"ports.esp32.apps.reader.main.app_shell.h.html","blurb":""},{"id":"ports/esp32/apps/reader/main/main.c","name":"main.c","grp":"ports/esp32","slug":"ports.esp32.apps.reader.main.main.c.html","blurb":"Woz UWB ranging engine on ESP32-S3 (ESP-IDF) \u2014 minimal bring-up app. Binds a canned URSK and starts the CCC DS-TWR responder on the DW3000, then polls for a range. With no iPhone/initiator present this proves the SPI + DW3000 + CCC init path comes up on ESP32-S3; a live range needs a peer that drives the DS-TWR exchange (an Aliro Wallet, or a second board as initiator). The demo responder lifecycle + interactive console live in app_shell.c."},{"id":"ports/esp32/components/aliro_ble/aliro_ble.c","name":"aliro_ble.c","grp":"ports/esp32","slug":"ports.esp32.components.aliro_ble.aliro_ble.c.html","blurb":"NimBLE-backed BLE transport for the Aliro reader: GAP advertising, the Aliro GATT service, and an L2CAP connection-oriented channel (CoC) used to carry Aliro protocol messages. Supports two bring-up modes: a standalone NimBLE host (aliro_ble_start) and attachment to a host already owned and synced by another stack such as esp-matter (aliro_ble_prepare + aliro_ble_start_attached). Tracks CoC channels per connection handle in a fixed-size table and exposes send/receive plus reader-status notification helpers to the rest of the Aliro reader."},{"id":"ports/esp32/components/aliro_reader/aliro_prov_nvs.c","name":"aliro_prov_nvs.c","grp":"ports/esp32","slug":"ports.esp32.components.aliro_reader.aliro_prov_nvs.c.html","blurb":"NVS-backed persistence for Aliro reader provisioning: loads and stores the serialized reader identity and trust store built by aliro_prov.c. Lazily initializes NVS on first use; safe to call alongside aliro_ble's own nvs_flash_init."},{"id":"ports/esp32/components/aliro_reader/aliro_stepup_worker.c","name":"aliro_stepup_worker.c","grp":"ports/esp32","slug":"ports.esp32.components.aliro_reader.aliro_stepup_worker.c.html","blurb":"*No module docstring. First commit: \"esp32: add the Aliro step-up (Access Document) phase\".*"},{"id":"ports/esp32/components/woz_uwb/port/board_pins.h","name":"board_pins.h","grp":"ports/esp32","slug":"ports.esp32.components.woz_uwb.port.board_pins.h.html","blurb":"DW3000 (DWM3000EVB) wiring per ESP32 target, SPI2/FSPI. Source of truth for the wiring table in docs/esp32-bringup.md. Change to match how the DWM3000EVB is soldered to your board."},{"id":"ports/esp32/components/woz_uwb/port/dw3000_hw.c","name":"dw3000_hw.c","grp":"ports/esp32","slug":"ports.esp32.components.woz_uwb.port.dw3000_hw.c.html","blurb":"ESP-IDF GPIO/IRQ backend for the DW3000 decadriver \u2014 implements dw3000_hw.h. Replaces the Zephyr deps/dw3000/platform/dw3000_hw.c (not compiled here). IRQ mirrors the Zephyr design: the GPIO ISR wakes a dedicated high-priority task (pinned to core 1) that calls dwt_isr() while the IRQ line stays high \u2014 dwt_isr does SPI, so it cannot run in true ISR context. Also provides the cycle-counter diag symbols that dwt_uwb_driver/dw3000/dw3000_device.c references (Xtensa CCOUNT via esp_cpu_get_cycle_count)."},{"id":"ports/esp32/components/woz_uwb/port/dw3000_spi.c","name":"dw3000_spi.c","grp":"ports/esp32","slug":"ports.esp32.components.woz_uwb.port.dw3000_spi.c.html","blurb":"ESP-IDF SPI backend for the DW3000 decadriver \u2014 implements dw3000_spi.h. Replaces the Zephyr deps/dw3000/platform/dw3000_spi.c (not compiled here). CS is a plain GPIO (spics_io_num = -1), matching the Zephyr cs-gpios model, so the wakeup path can hold CS low ~500us. Each DW3000 command is one CS-low full-duplex transfer: header + body assembled in a DMA-capable, word-aligned bounce buffer; on reads the body slice of the RX buffer is copied back."},{"id":"ports/esp32/components/woz_uwb/port/woz_wrap_stubs.c","name":"woz_wrap_stubs.c","grp":"ports/esp32","slug":"ports.esp32.components.woz_uwb.port.woz_wrap_stubs.c.html","blurb":"Minimal ESP-IDF port of the essential RX-callback shim. The Nordic build routes DW3000 RX events through uwb_rxdiag.c's __wrap_dwt_setcallbacks -> shim_rxok, which (after the blob's own prepoll_rx_rearm arms the SP3 POLL window) calls ccc_shim_rx_try_prepoll to decrypt+warm the NEXT block's STS.  That bootstrap warm is what flips g_warm_valid true so the POLL window ever gets armed and Response_0 sent. This port omits uwb_rxdiag.c wholesale (its heartbeat needs Zephyr k_work, which the compat layer does not provide), so without this shim dwt_setcallbacks installs prepoll_rx_rearm directly, ccc_shim_rx_try_prepoll is never reached, g_warm_valid stays false, and the responder receives Pre-POLLs but never replies.  Re-create only the essential chain here (no k_work, no diagnostics). Also keeps the dwt_configurestsmode pass-through the essential RX path needs."},{"id":"release/esp32-matter-lock/flash.sh","name":"flash.sh","grp":"release","slug":"release.esp32-matter-lock.flash.sh.html","blurb":"flash.sh \u2014 program the openaliro ESP32-S3 Matter lock (single merged image at offset 0x0) with esptool. See FLASH.md for wiring and first run. Usage:  bash flash.sh [PORT]       e.g.  bash flash.sh /dev/ttyACM0"},{"id":"release/nrf5340dk/flash.sh","name":"flash.sh","grp":"release","slug":"release.nrf5340dk.flash.sh.html","blurb":"flash.sh \u2014 program the openaliro nRF5340 DK firmware (both cores) over the DK's on-board J-Link, using nrfutil. See FLASH.md for setup and first run. Usage:  bash flash.sh [JLINK_SERIAL_NUMBER]"},{"id":"scripts/bootstrap.sh","name":"bootstrap.sh","grp":"scripts","slug":"scripts.bootstrap.sh.html","blurb":"bootstrap.sh \u2014 build a self-contained west workspace, PRISTINE from upstream. Fetches everything the build needs from public GitHub into ./workspace (git-ignored), then applies our integration patches on top. It never reads from any other local checkout \u2014 a clean upstream fetch every time. Fetches (all public): - Nordic add-on  ncs-door-lock-and-access-control @ the pin below - NCS v3.3.0 + Zephyr + every module (via the add-on's own west manifest) Prereq (once per machine): nRF Connect SDK v3.3.0 toolchain nrfutil sdk-manager toolchain install --ncs-version v3.3.0 Usage:  scripts/bootstrap.sh                       # workspace in ./workspace ALIRO_WS=/big/disk/ws scripts/bootstrap.sh # put the multi-GB workspace elsewhere"},{"id":"scripts/build.sh","name":"build.sh","grp":"scripts","slug":"scripts.build.sh.html","blurb":"build.sh {build|rebuild|flash|flash-erase|build-flash} \u2014 build the Aliro NFC+UWB image from the self-contained ./workspace. Run scripts/bootstrap.sh first. Layers our modules + ISC dw3000 onto the fetched add-on via out-of-tree overlays. Output \u2192 ./build (git-ignored). Incremental by default \u2014 a full from-scratch (pristine) build runs only when it has to: first build, changed build flags (UWB chip / self-test / config), or when you ask for one. A preflight first checks the workspace is bootstrapped. scripts/build.sh build                  # incremental where safe (fast) scripts/build.sh rebuild                # force a clean pristine build PRISTINE=1 scripts/build.sh build       # same as rebuild UWB_SELFTEST=1 scripts/build.sh build   # one-shot boot self-test, no iPhone (diagnostic) PRETTY=1 scripts/build.sh build         # curated/clean console (reversible; default verbose) UWB_CHIP=dw3720 scripts/build.sh build  # select the plugged-in UWB chip (default: dw3000)"},{"id":"scripts/docs-publish.sh","name":"docs-publish.sh","grp":"scripts","slug":"scripts.docs-publish.sh.html","blurb":"docs-publish.sh \u2014 snapshot the rendered site/ onto the local gh-pages branch. The site is a build artifact and never lives on main; what gets published is a snapshot branch that holds site/'s contents at its root. This script only moves the LOCAL gh-pages ref \u2014 pushing it (git push origin gh-pages) stays a human step on purpose. Run it through make docs-publish, which rebuilds the site first so a stale or partial tree can never be snapshotted. Guards, in order: - site/index.html and site/.nojekyll must exist (the build completed); - docs/ must be clean: if the rebuild just changed the committed pages, they must be committed first, so every snapshot corresponds to a commit; - an existing gh-pages branch is reused only when it is one of our snapshots (\"docs site \u2026\") \u2014 a real branch by that name is never eaten; - the snapshot must actually contain index.html and .nojekyll; - each snapshot chains to the previous one, so the push fast-forwards. Nothing here checks out a branch or touches the working tree: the snapshot is built through a throwaway index, so it is safe to run from any worktree, with any branch checked out, dirty or not."},{"id":"scripts/docs.sh","name":"docs.sh","grp":"scripts","slug":"scripts.docs.sh.html","blurb":"docs.sh \u2014 build the documentation site into site/. Two generators write into the same output directory, in this order: 1. the subsystem tree + guides + search shell   -> site/*.html 2. doxygen (docs/Doxyfile)                      -> site/api/ then a link pass rewrites cross-document links so the published site has no dead ends, and the freshness gate confirms the committed docs/ tree matches the source. Run it through make docs. Nothing here needs the NCS toolchain or hardware."},{"id":"scripts/flash_html.py","name":"flash_html.py","grp":"scripts","slug":"scripts.flash_html.html","blurb":"Render a release FLASH.md into a self-contained FLASH.html."},{"id":"scripts/ws-seed.sh","name":"ws-seed.sh","grp":"scripts","slug":"scripts.ws-seed.sh.html","blurb":"ws-seed.sh \u2014 give this git worktree its own NCS workspace, cheaply. Frequent branch-bouncing over a single shared workspace is a trap: the tree holds one patch state at a time (last bootstrap wins), so a build from the wrong worktree silently compiles another branch's patches. This seeds a per-worktree workspace at the default path ($TREE/workspace) so build.sh picks it up with no env var, and each worktree stays self-contained. Cheap because it uses an APFS copy-on-write clone (cp -c): the clone shares every block with the primary and costs ~0 extra disk until a patched file diverges. Cleanup is automatic \u2014 the workspace lives inside the worktree, so deleting the worktree deletes it (see make ws-clean)."},{"id":"tools/aliro_lab.py","name":"aliro_lab.py","grp":"tools","slug":"tools.aliro_lab.html","blurb":"Aliro Lab: score a captured reader serial log."},{"id":"tools/docs_3d.py","name":"docs_3d.py","grp":"tools","slug":"tools.docs_3d.html","blurb":"Render the whole code surface as a flyable 3D graph: site/graph3d.html."},{"id":"tools/docs_api.py","name":"docs_api.py","grp":"tools","slug":"tools.docs_api.html","blurb":"Fill the reference pages the page generator leaves bare."},{"id":"tools/docs_cmds.py","name":"docs_cmds.py","grp":"tools","slug":"tools.docs_cmds.html","blurb":"Render runnable command blocks as one copy chip per command."},{"id":"tools/docs_flash.py","name":"docs_flash.py","grp":"tools","slug":"tools.docs_flash.html","blurb":"Publish the browser flasher: site/flash/ = the web-flasher/ page + firmware."},{"id":"tools/docs_github.py","name":"docs_github.py","grp":"tools","slug":"tools.docs_github.html","blurb":"Point the rendered site back at its GitHub repository."},{"id":"tools/docs_graph.py","name":"docs_graph.py","grp":"tools","slug":"tools.docs_graph.html","blurb":"Make the architecture page's dependency graph legible."},{"id":"tools/docs_links.py","name":"docs_links.py","grp":"tools","slug":"tools.docs_links.html","blurb":"Repair cross-document links in the rendered site, then assert none are left broken."},{"id":"tools/docs_media.py","name":"docs_media.py","grp":"tools","slug":"tools.docs_media.html","blurb":"Add the repo's imagery to the rendered site: demo screenshots and a share card."},{"id":"tools/docs_nav.py","name":"docs_nav.py","grp":"tools","slug":"tools.docs_nav.html","blurb":"Give the rendered site one curated reading order."},{"id":"tools/docs_start.py","name":"docs_start.py","grp":"tools","slug":"tools.docs_start.html","blurb":"Give the rendered site a real \"Get started\" landing."},{"id":"tools/docs_theme.py","name":"docs_theme.py","grp":"tools","slug":"tools.docs_theme.html","blurb":"Retheme the rendered site: warm paper surfaces, serif display headings."},{"id":"tools/docs_title.py","name":"docs_title.py","grp":"tools","slug":"tools.docs_title.html","blurb":"Title the generated pages after the repository, not after the checkout directory."},{"id":"tools/docs_twin.py","name":"docs_twin.py","grp":"tools","slug":"tools.docs_twin.html","blurb":"Fold the interactive walk-up digital twin into the rendered site."},{"id":"web-twin/check_constants.py","name":"check_constants.py","grp":"web-twin","slug":"web-twin.check_constants.html","blurb":"*No module docstring. First commit: \"web: add th e_plausible","modules.woz_uwb.src.fira.fira_session.h.html#fira_session_range_plausible"],["m","FIRA_STS_QUALITY_MIN","modules.woz_uwb.src.fira.fira_session.h.html#FIRA_STS_QUALITY_MIN"],["f","fira_session_sts_quality_ok","modules.woz_uwb.src.fira.fira_session.h.html#fira_session_sts_quality_ok"],["m","FIRA_RANGE_TRUST_K","modules.woz_uwb.src.fira.fira_session.h.html#FIRA_RANGE_TRUST_K"],["m","FIRA_RANGE_SPREAD_CM","modules.woz_uwb.src.fira.fira_session.h.html#FIRA_RANGE_SPREAD_CM"],["f","fira_session_range_trusted","modules.woz_uwb.src.fira.fira_session.h.html#fira_session_range_trusted"],["f","fira_session_set_range_listener","modules.woz_uwb.src.fira.fira_session.h.html#fira_session_set_range_listener"]],"ports.esp32.apps.matter-lock.main.app_priv.h.html":[["c","app_driver_handle_t","ports.esp32.apps.matter-lock.main.app_priv.h.html#app_driver_handle_t"],["f","app_driver_button_init","ports.esp32.apps.matter-lock.main.app_priv.h.html#app_driver_button_init"],["f","app_driver_led_init","ports.esp32.apps.matter-lock.main.app_priv.h.html#app_driver_led_init"],["f","app_driver_led_lock_state","ports.esp32.apps.matter-lock.main.app_priv.h.html#app_driver_led_lock_state"],["f","app_driver_attribute_update","ports.esp32.apps.matter-lock.main.app_priv.h.html#app_driver_attribute_update"],["f","door_lock_init","ports.esp32.apps.matter-lock.main.app_priv.h.html#door_lock_init"]],"ports.esp32.apps.matter-lock.main.app_shell.h.html":[["f","app_shell_start","ports.esp32.apps.matter-lock.main.app_shell.h.html#app_shell_start"]],"ports.esp32.apps.reader.main.app_shell.h.html":[["f","app_responder_start","ports.esp32.apps.reader.main.app_shell.h.html#app_responder_start"],["f","app_responder_stop","ports.esp32.apps.reader.main.app_shell.h.html#app_responder_stop"],["f","app_responder_up","ports.esp32.apps.reader.main.app_shell.h.html#app_responder_up"],["f","app_shell_start","ports.esp32.apps.reader.main.app_shell.h.html#app_shell_start"]],"ports.esp32.components.woz_uwb.port.bo <script>
(function(){
"use strict";
var theme=null;
try{theme=localStorage.getItem("dm-theme")}catch(e){}
if(theme==="dark"||(theme!=="light"&&matchMedia("(prefers-color-scheme:dark)").matches))
  document.documentElement.setAttribute("data-theme","dark");

var D=JSON.parse(document.getElementById("gv3d-data").textContent);
var colOf={},rgbOf={};
Object.keys(D.slots).forEach(function(g){
  var hex=D.colors[D.slots[g]%D.colors.length];colOf[g]=hex;
  var n=parseInt(hex.slice(1),16);rgbOf[g]=[n>>16&255,n>>8&255,n&255];
});
var byId={},outs={},ins={};
D.nodes.forEach(function(n){byId[n.id]=n;outs[n.id]=[];ins[n.id]=[]});
D.links.forEach(function(l){outs[l.source].push(l.target);ins[l.target].push(l.source)});
var deg={};D.nodes.forEach(function(n){deg[n.id]=outs[n.id].length+ins[n.id].length});

/* symbol kinds: function / type / macro — badge word and color */
var KMETA={f:["function","#d97757",[217,119,87]],
           c:["type","#4a90d9",[74,144,217]],
           m:["macro","#c9a227",[201,162,39]]};

var sel=null,hov=null,near={},iso=null,q="";
var stack=[],curNodes=D.nodes;
function visible(n){
  if(iso&&n.grp!==iso)return false;
  if(q&&((n.id+" "+n.name).toLowerCase().indexOf(q)<0))return false;
  return true;
}
function nodeColor(n){
  var c=n.kind&&KMETA[n.kind]?KMETA[n.kind][2]:(rgbOf[n.grp]||[150,150,150]);
  var dim=!visible(n)||(sel&&n.id!==sel&&!near[n.id]);
  var a=dim?0.10:(n.kind==="dep"||n.kind==="use"?0.75:0.92);
  return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")";
}
function linkColor(l){
  var a=sel&&(l.source.id===sel||l.target.id===sel);
  if(sel&&!a)return "rgba(250,249,245,0.03)";
  if(iso&&(l.source.grp!==iso||l.target.grp!==iso))return "rgba(250,249,245,0.03)";
  if(a)return "rgba(250,249,245,0.55)";
  var t=l.target,c=t.kind&&KMETA[t.kind]?KMETA[t.kind][2]:(rgbOf[l.source.grp]||[150,150,150]);
  return "rgba("+c[0]+","+c[1]+","+c[2]+","+(t.kind&&KMETA[t.kind]?0.22:0.16)+")";
}
var lastClick={id:null,t:0};
var Graph=ForceGraph3D({controlType:"orbit"})(document.getElementById("stage"))
  .graphData({nodes:D.nodes,links:D.links})
  .backgroundColor("rgba(0,0,0,0)")
  .nodeVal(function(n){return n.val||1.6+(deg[n.id]||0)*0.55})
  .nodeResolution(24)
  .nodeColor(nodeColor)
  .nodeOpacity(1)
  .nodeLabel(function(n){
    if(n.kind&&KMETA[n.kind])return KMETA[n.kind][0]+" &middot; "+n.name;
    if(n.kind==="dep")return n.id+" &middot; dependency &mdash; click to dive";
    if(n.kind==="use")return n.id+" &middot; uses this file &mdash; click to dive";
    if(n.kind==="file")return n.id+" &middot; click for its reference page";
    return n.id+" &middot; "+(outs[n.id]||[]).length+"&#8599; "+(ins[n.id]||[]).length+"&#8601;";
  })
  .linkColor(linkColor)
  .linkOpacity(1)
  .linkWidth(function(l){return sel&&(l.source.id===sel||l.target.id===sel)?1.2:0})
  .linkDirectionalParticles(function(l){return sel&&(l.source.id===sel||l.target.id===sel)?2:0})
  .linkDirectionalParticleWidth(1.4)
  .linkDirectionalParticleSpeed(0.007)
  .warmupTicks(90)
  .cooldownTicks(180)
  .d3VelocityDecay(0.32)
  .onNodeHover(function(n){hov=n})
  .onNodeClick(function(n){
    var now=Date.now();
    if(!stack.length&&n.id===lastClick.id&&now-lastClick.t<340){
      lastClick={id:null,t:0};dive(n.id);return;
    }
    lastClick={id:n.id,t:now};
    nodeAct(n);
  })
  .onBackgroundClick(function(){select(null)});

/* steering: orbit controls with inertia — drag to orbit, right-drag to pan,
   the wheel zooms toward the cursor; F or the Fit button reframes everything.
   A slow auto-orbit runs until the first touch or flight */
var ctr=Graph.controls();
ctr.enableDamping=true;ctr.dampingFactor=0.085;
ctr.screenSpacePanning=true;
if("zoomToCursor" in ctr)ctr.zoomToCursor=true;
ctr.zoomSpeed=1.3;ctr.rotateSpeed=0.85;
ctr.autoRotate=true;ctr.autoRotateSpeed=0.4;
function wake(){ctr.autoRotate=false}
["pointerdown","wheel"].forEach(function(ev){
  document.getElementById("stage").addEventListener(ev,wake,{once:true,passive:true});
});
function fitAll(){wake();Graph.zoomToFit(700,stack.length?100:130)}
document.getElementById("fit").addEventListener("click",fitAll);

/* physics: gentle repulsion, short in-cluster links, cluster cohesion, and a
   containment sphere so leaf files hang near their constellation instead of
   drifting to infinity. In a dive, symbols sit close and portals ring wide */
Graph.d3Force("charge").strength(-70);
function kdist(k){
  if(k==="f"||k==="c"||k==="m")return 60;
  if(k==="dep"||k==="use")return 165;
  return 0;
}
Graph.d3Force("link").distance(function(l){
  var s=l.source,t=l.target;
  if(typeof s!=="object"||typeof t!=="object")return 60;
  var d=Math.max(kdist(s.kind),kdist(t.kind));
  if(d)return d;
  return s.grp===t.grp?34:95;
});
var nds=[];
function fCluster(alpha){
  var c={};
  nds.forEach(function(n){
    var b=c[n.grp]||(c[n.grp]={x:0,y:0,z:0,m:0});
    b.x+=n.x;b.y+=n.y;b.z+=n.z;b.m++;
  });
  var k=alpha*0.07;
  nds.forEach(function(n){
    var b=c[n.grp];if(b.m<2)return;
    n.vx+=(b.x/b.m-n.x)*k;n.vy+=(b.y/b.m-n.y)*k;n.vz+=(b.z/b.m-n.z)*k;
  });
}
fCluster.initialize=function(a){nds=a};
function fContain(alpha){
  var R=250;
  nds.forEach(function(n){
    var r=Math.hypot(n.x,n.y,n.z);
    if(r>R){var k=(r-R)/r*alpha*0.14;n.vx-=n.x*k;n.vy-=n.y*k;n.vz-=n.z*k}
  });
}
fContain.initialize=function(a){nds=a};
Graph.d3Force("cluster",fCluster);
Graph.d3Force("contain",fContain);

/* lighting: reshape the stock ambient+directional rig into a key/fill/rim
   trio — warm key from above, cool fill, a faint coral rim from below —
   so the spheres read as lit objects instead of flat blobs */
(function(){
  var amb=null,dir=null,scene=Graph.scene();
  scene.traverse(function(o){
    if(o.type==="AmbientLight")amb=amb||o;
    else if(o.type==="DirectionalLight")dir=dir||o;
  });
  if(amb){amb.color.set("#cdd0dc");amb.intensity*=0.65}
  if(dir){
    dir.color.set("#fff3e4");dir.intensity*=0.95;
    dir.position.set(650,900,420);
    var fill=dir.clone();
    fill.color.set("#8fa6d9");fill.intensity=dir.intensity*0.35;
    fill.position.set(-450,250,720);scene.add(fill);
    var rim=dir.clone();
    rim.color.set("#d97757");rim.intensity=dir.intensity*0.4;
    rim.position.set(-600,-700,-500);scene.add(rim);
  }
})();

/* a whisper of self-illumination per node so shadowed sides keep their
   cluster color; scaled by material opacity so dimmed nodes stay dim */
function glaze(){
  var seen=[];
  curNodes.forEach(function(n){
    var o=n.__threeObj;
    if(!o||!o.material||!o.material.emissive)return;
    var m=o.material;
    if(seen.indexOf(m)>=0)return;seen.push(m);
    m.emissive.copy(m.color).multiplyScalar(0.24*(m.opacity==null?1:m.opacity));
  });
}

function refresh(){Graph.nodeColor(Graph.nodeColor());}

function esc(s){var d=document.createElement("i");d.textContent=s;return d.innerHTML}
function chip(id){return '<span class="chip" data-go="'+esc(id)+'">'+esc(id.split("/").pop())+"</span>"}

/* what a click means depends on where you are: on the surface it selects,
   in a dive symbols open their docs and outer files dive deeper */
function nodeAct(n){
  if(stack.length){
    if(n.url||n.kind==="file")openDoc(n);
    else dive(n.id);
  }else select(n,true);
}

/* labels: on the surface, every cluster hub plus the highest-degree files;
   in a dive, everything (or just the file and its portals when the API is
   huge). Quiet until hover or selection brings them forward */
var important={};
(function(){
  var hubs={};
  D.nodes.forEach(function(n){
    if(!hubs[n.grp]||deg[n.id]>deg[hubs[n.grp].id])hubs[n.grp]=n;
  });
  Object.keys(hubs).forEach(function(g){important[hubs[g].id]=1});
  D.nodes.slice().sort(function(a,b){return deg[b.id]-deg[a.id]})
    .slice(0,18).forEach(function(n){important[n.id]=1});
})();
var labWrap=document.getElementById("labels"),labs={};
function ensureLab(n){
  var L=labs[n.id];
  if(L){L.n=n;return}
  var el=document.createElement("div");
  el.className="lab"+(n.url?" lab-s":"");
  el.textContent=n.name;
  el.addEventListener("click",function(){nodeAct(labs[n.id].n)});
  labWrap.appendChild(el);
  labs[n.id]={el:el,n:n};
}
labWrap.addEventListener("wheel",function(e){
  try{
    var cv=document.querySelector("#stage canvas");
    if(cv)cv.dispatchEvent(new WheelEvent("wheel",e));
  }catch(x){}
},{passive:true});
function syncLabs(){
  var want={};
  if(stack.length){
    if(curNodes.length<=52)curNodes.forEach(function(n){want[n.id]=n});
    else curNodes.forEach(function(n){if(!n.url)want[n.id]=n});
  }else{
    Object.keys(important).forEach(function(k){want[k]=byId[k]});
    if(sel&&byId[sel]){
      want[sel]=byId[sel];
      Object.keys(near).forEach(function(k){if(byId[k])want[k]=byId[k]});
    }
  }
  Object.keys(labs).forEach(function(id){
    if(!want[id]){labWrap.removeChild(labs[id].el);delete labs[id]}
  });
  Object.keys(want).forEach(function(id){ensureLab(want[id])});
}
syncLabs();
var camDirV=null;
(function tick(){
  requestAnimationFrame(tick);
  glaze();
  if(ctr.update)ctr.update();
  var cam=Graph.camera();
  if(!camDirV)camDirV=cam.position.clone();
  cam.getWorldDirection(camDirV);
  Object.keys(labs).forEach(function(id){
    var n=labs[id].n,el=labs[id].el;
    if(typeof n.x!=="number"){el.style.opacity=0;return}
    var dx=n.x-cam.position.x,dy=n.y-cam.position.y,dz=n.z-cam.position.z;
    if(dx*camDirV.x+dy*camDirV.y+dz*camDirV.z<=0||!visible(n)){el.style.opacity=0;return}
    var dist=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    var a;
    if(sel)a=n.id===sel?1:(near[n.id]?0.8:0.05);
    else if(hov&&hov.id===n.id)a=1;
    else{var t=Math.max(0,Math.min(1,(950-dist)/650));a=0.12+0.34*t}
    var s=(sel&&n.id===sel)||(hov&&hov.id===n.id)?1.1
      :Math.max(0.85,Math.min(1.05,520/dist));
    var p=Graph.graph2ScreenCoords(n.x,n.y,n.z);
    el.style.opacity=a;
    el.style.transform="translate("+p.x+"px,"+p.y+"px) translate(-50%,-150%) scale("+s+")";
  });
})();

function select(n,fly){
  sel=n?n.id:null;near={};
  var panel=document.getElementById("panel");
  if(!n){panel.classList.remove("on");syncLabs();refresh();return}
  outs[n.id].forEach(function(t){near[t]=1});
  ins[n.id].forEach(function(t){near[t]=1});
  document.getElementById("pey").innerHTML='<i style="--c:'+colOf[n.grp]+'"></i>'+esc(n.grp);
  document.getElementById("pname").textContent=n.name;
  document.getElementById("ppath").textContent=n.id;
  var b="";
  if(n.blurb)b+="<p>"+esc(n.blurb)+"</p>";
  if(outs[n.id].length)b+='<div class="p-cap">Depends on &middot; '+outs[n.id].length+
    '</div><div class="chips">'+outs[n.id].map(chip).join("")+"</div>";
  if(ins[n.id].length)b+='<div class="p-cap">Used by &middot; '+ins[n.id].length+
    '</div><div class="chips">'+ins[n.id].map(chip).join("")+"</div>";
  var syms=D.syms[n.slug]||[];
  if(syms.length){
    b+='<div class="p-cap p-dive" data-dive="'+esc(n.id)+'">API surface &middot; '+
      syms.length+" &mdash; explore in 3D &#8600;</div>";
    syms.forEach(function(s){
      b+='<div class="sym"><b>'+{f:"F",c:"T",m:"#"}[s[0]]+"</b><a data-k=\""+s[0]+
        "\" target=\"_blank\" rel=\"noopener\" href=\""+esc(s[2])+'">'+esc(s[1])+"</a></div>";
    });
  }
  document.getElementById("pbody").innerHTML=b;
  document.getElementById("popen").setAttribute("href",n.slug);
  panel.classList.add("on");
  syncLabs();
  refresh();
  if(fly&&typeof n.x==="number"){
    wake();
    var d=70+Math.sqrt(deg[n.id])*8,r=Math.hypot(n.x,n.y,n.z)||1,k=1+d/r;
    Graph.cameraPosition({x:n.x*k,y:n.y*k,z:n.z*k},n,900);
  }
}
document.getElementById("pbody").addEventListener("click",function(e){
  var t=e.target;
  var dv=t.closest("[data-dive]");
  if(dv){dive(dv.getAttribute("data-dive"));return}
  var a=t.closest(".sym a");
  if(a){
    e.preventDefault();
    openDoc({name:a.textContent,url:a.getAttribute("href"),kind:a.getAttribute("data-k")});
    return;
  }
  var go=t.getAttribute&&t.getAttribute("data-go");
  if(go&&byId[go])select(byId[go],true);
});
document.getElementById("px").addEventListener("click",function(){select(null)});

/* the dive: one file becomes a fixed sun, its API symbols the close orbit,
   its dependencies and users an outer ring of portals to dive on through */
function layerData(id){
  var f=byId[id],nodes=[],links=[],seen={};
  nodes.push({id:f.id,name:f.name,grp:f.grp,slug:f.slug,blurb:f.blurb,
    kind:"file",val:16,fx:0,fy:0,fz:0});
  seen[id]=1;
  (D.syms[f.slug]||[]).forEach(function(s){
    var sid="s:"+s[2];
    nodes.push({id:sid,name:s[1],kind:s[0],url:s[2],grp:f.grp,val:1.5});
    links.push({source:id,target:sid});
  });
  outs[id].forEach(function(t){
    if(seen[t])return;seen[t]=1;var o=byId[t];
    nodes.push({id:t,name:o.name,grp:o.grp,slug:o.slug,blurb:o.blurb,kind:"dep",val:5});
    links.push({source:id,target:t});
  });
  ins[id].forEach(function(t){
    if(seen[t])return;seen[t]=1;var o=byId[t];
    nodes.push({id:t,name:o.name,grp:o.grp,slug:o.slug,blurb:o.blurb,kind:"use",val:5});
    links.push({source:t,target:id});
  });
  return {nodes:nodes,links:links};
}
function dive(id){
  if(!byId[id])return;
  stack.push(id);
  setMode();
}
function renderCrumbs(){
  var h='<span class="cr" data-i="0">The whole surface</span>';
  stack.forEach(function(id,i){
    h+='<span class="sep">&#8250;</span><span class="cr" data-i="'+(i+1)+'">'+
      esc(byId[id].name)+"</span>";
  });
  document.getElementById("crumbs").innerHTML=h;
}
document.getElementById("crumbs").addEventListener("click",function(e){
  var i=e.target.getAttribute&&e.target.getAttribute("data-i");
  if(i==null)return;
  i=+i;
  if(i===stack.length)return;
  stack=stack.slice(0,i);
  setMode();
});
function setMode(){
  select(null);
  closeDoc();
  iso=null;
  var legendEl=document.getElementById("legend");
  Array.prototype.forEach.call(legendEl.children,function(c){c.classList.remove("on")});
  var top=stack.length?stack[stack.length-1]:null;
  if(top){
    var L=layerData(top);
    curNodes=L.nodes;
    legendEl.style.display="none";
    Graph.graphData(L);
    Graph.cameraPosition({x:0,y:60,z:430},{x:0,y:0,z:0},700);
  }else{
    curNodes=D.nodes;
    legendEl.style.display="";
    Graph.graphData({nodes:D.nodes,links:D.links});
  }
  document.getElementById("hint").innerHTML=stack.length
    ?"click a symbol for its docs &middot; click an outer file to dive on &middot; Esc backs out"
    :"drag to orbit &middot; right-drag to pan &middot; scroll to zoom &middot; F fits &middot; double-click dives";
  renderCrumbs();
  fitted=false;
  wake();
  syncLabs();
  refresh();
}

/* the doc overlay: the real reference page in a themed card, chrome hidden,
   scrolled to the symbol — live from the site, closable back to the graph */
var docEl=document.getElementById("doc"),dframe=document.getElementById("dframe");
function openDoc(o){
  var url=o.url||o.slug;
  if(!url)return;
  var km=KMETA[o.kind];
  var badge=document.getElementById("dkind");
  badge.textContent=km?km[0]:"file";
  badge.style.setProperty("--kc",km?km[1]:"");
  document.getElementById("dname").textContent=o.name;
  document.getElementById("dopen").setAttribute("href",url);
  dframe.onload=function(){
    try{
      var d=dframe.contentDocument;
      if(!d||d.getElementById("gv3d-strip"))return;
      var st=d.createElement("style");
      st.id="gv3d-strip";
      st.textContent=".side,.topbar,.toc-rail,.scrim,.palette{display:none!important}"+
        ".app{display:block!important}"+
        ".content{margin:0!important;max-width:none!important}"+
        "main.doc{margin:0 auto!important;padding:1.2rem 1.6rem 3rem!important}"+
        ":target{scroll-margin-top:1.2rem}"+
        "section.api-entry:target{animation:gvmark 1.8s ease}"+
        "@keyframes gvmark{0%{background:rgba(217,119,87,.16);"+
        "box-shadow:0 0 0 10px rgba(217,119,87,.16);border-radius:10px}"+
        "100%{background:transparent;box-shadow:none}}";
      d.head.appendChild(st);
      var anchor=url.split("#")[1];
      if(anchor){
        var target=d.getElementById(anchor);
        if(target)target.scrollIntoView({block:"start"});
      }
    }catch(e){}
  };
  dframe.src=url;
  docEl.classList.add("on");
}
function closeDoc(){
  if(!docEl.classList.contains("on"))return;
  docEl.classList.remove("on");
  dframe.src="about:blank";
}
document.getElementById("dx").addEventListener("click",closeDoc);
docEl.addEventListener("click",function(e){if(e.target===docEl)closeDoc()});
document.getElementById("dcopy").addEventListener("click",function(){
  var self=this,href=document.getElementById("dopen").getAttribute("href");
  try{
    navigator.clipboard.writeText(new URL(href,location.href).href).then(function(){
      self.textContent="Copied ✓";
      setTimeout(function(){self.textContent="Copy link"},1400);
    });
  }catch(e){}
});

addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    if(docEl.classList.contains("on"))closeDoc();
    else if(sel)select(null);
    else if(stack.length){stack.pop();setMode()}
  }
  else if((e.key==="f"||e.key==="F")&&!/INPUT|TEXTAREA/.test(e.target.tagName))fitAll();
});

var legend=document.getElementById("legend");
Object.keys(D.slots).sort().forEach(function(g){
  if(!D.nodes.some(function(n){return n.grp===g}))return;
  var el=document.createElement("span");
  el.className="lg";el.innerHTML='<i style="--c:'+colOf[g]+'"></i>'+esc(g);
  el.addEventListener("click",function(){
    iso=iso===g?null:g;
    Array.prototype.forEach.call(legend.children,function(c){c.classList.remove("on")});
    if(iso)el.classList.add("on");
    refresh();
    if(iso){wake();Graph.zoomToFit(700,110,function(n){return n.grp===g})}
    else fitAll();
  });
  legend.appendChild(el);
});
document.getElementById("q").addEventListener("input",function(){
  q=this.value.trim().toLowerCase();refresh();
});
document.getElementById("q").addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;
  var s=this.value.trim().toLowerCase();
  if(!s)return;
  var best=null,bs=0;
  curNodes.forEach(function(n){
    if(!visible(n))return;
    var nm=n.name.toLowerCase(),sc=
      nm===s?4:nm.indexOf(s)===0?3:nm.indexOf(s)>=0?2:n.id.toLowerCase().indexOf(s)>=0?1:0;
    if(sc>bs){bs=sc;best=n}
  });
  if(best)nodeAct(best);
});

/* once the layout settles, frame everything from a step further back; the
   auto-orbit carries on until the first touch */
var fitted=false;
Graph.onEngineStop(function(){
  if(fitted)return;fitted=true;
  Graph.zoomToFit(800,stack.length?100:130);
});
addEventListener("resize",function(){Graph.width(innerWidth).height(innerHeight)});
})();
</script>
</body>
